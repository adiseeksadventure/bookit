# Full-stack orchestration for BookIt. Three decoupled services, each built from
# its own context/Dockerfile:
#
#   db        Postgres — the only stateful service.
#   backend   Express API — the ONLY service with DB credentials. Not published
#             to the host; only `frontend` reaches it over the internal network.
#   frontend  Next.js edge — serves the UI and proxies /api/* to `backend`.
#
#   docker compose up --build         # bring the whole stack up
#   docker compose up -d db           # just Postgres (for local `npm run dev`)
#   docker compose run --rm backend npm run seed   # seed the database (one-off)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bookit_user
      POSTGRES_PASSWORD: bookit_pass
      POSTGRES_DB: bookit_db
    # Host port 5433 -> container 5432. Avoids clashing with a native Postgres on
    # the host's 5432. Published so local `npm run dev` and tooling can reach it.
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookit_user -d bookit_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./server
    environment:
      # Reaches the db service by name over the internal compose network.
      DATABASE_URL: postgresql://bookit_user:bookit_pass@db:5432/bookit_db?schema=public
      # MUST equal the frontend's NEXTAUTH_SECRET — the edge mints JWTs this verifies.
      AUTH_SECRET: supersecretkey_changethis_inprod
      PORT: "4000"
    # Intentionally NOT published — the browser must never reach the backend
    # directly. Only the frontend service can, via http://backend:4000.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:4000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:4000
      # Same value as the backend's AUTH_SECRET (session signing + proxy JWT).
      NEXTAUTH_SECRET: supersecretkey_changethis_inprod
      NEXTAUTH_URL: http://localhost:3000
      # Self-hosted Auth.js behind compose: trust the forwarded host.
      AUTH_TRUST_HOST: "true"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
