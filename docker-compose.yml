services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bookit_user
      POSTGRES_PASSWORD: bookit_pass
      POSTGRES_DB: bookit_db
    # Host port 5433 -> container 5432. Avoids clashing with a native
    # Postgres on the host's 5432 (which silently steals localhost
    # connections and causes Prisma P1010 "user denied access").
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookit_user -d bookit_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The Express backend — the ONLY service that talks to Postgres. It is not
  # published to the host: the browser can't reach it, only the `app` service
  # can (over the internal compose network, via the service name `backend`).
  # This is the decoupling the architecture is built around (see NOTES §1.1).
  # Run migrations/seed against THIS service — it owns the database connection.
  backend:
    build: .
    command: npm run server
    environment:
      DATABASE_URL: postgresql://bookit_user:bookit_pass@db:5432/bookit_db?schema=public
      # MUST match the app's NEXTAUTH_SECRET — the app mints JWTs the backend verifies.
      AUTH_SECRET: supersecretkey_changethis_inprod
      PORT: "4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:4000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      db:
        condition: service_healthy

  # The public edge: serves the UI and a thin proxy API. Holds NO database
  # credentials — it forwards every /api/* call to `backend` and only manages
  # Auth.js sessions.
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:4000
      # Same value as the backend's AUTH_SECRET (Auth.js session signing + the
      # short-lived JWT the proxy forwards to the backend).
      NEXTAUTH_SECRET: supersecretkey_changethis_inprod
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
